<div id="gamer-id-block-{{ safe_name }}" class="p-3 rounded-lg bg-gray-900/60 border border-cyan-500/10">
    <p class="text-xs font-semibold text-cyan-400 mb-2">{{ platform_name }} — Gamer ID</p>

    {% if existing_usernames %}
    <div class="flex flex-wrap gap-2 mb-2">
        {% for username in existing_usernames %}
        <label class="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-gray-800 border border-cyan-500/20 cursor-pointer hover:border-cyan-400/50 transition text-xs">
            <input
                type="checkbox"
                name="gamer_id__{{ safe_name }}"
                value="{{ username }}"
                class="w-3.5 h-3.5 rounded border-cyan-500/50 bg-gray-900 text-cyan-500 focus:ring-cyan-500/50 cursor-pointer"
            />
            <span class="text-gray-200">{{ username }}</span>
        </label>
        {% endfor %}
    </div>
    {% else %}
    <p class="text-xs text-gray-500 mb-2">No existing {{ platform_name }} accounts yet — add one below.</p>
    {% endif %}

    <input
        type="text"
        name="new_gamer_id__{{ safe_name }}"
        placeholder="Add a new {{ platform_name }} gamer ID..."
        class="w-full px-2.5 py-1.5 text-xs rounded bg-gray-800 border border-cyan-500/20 text-white placeholder-gray-600 focus:border-cyan-400 focus:outline-none"
    />
</div>
