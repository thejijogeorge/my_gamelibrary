version: '3.8'

services:
  db:
    image: postgres:16
    container_name: gamelibrary-db
    environment:
      POSTGRES_USER: ${DB_USER:-gameapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gameapp}
      POSTGRES_DB: ${DB_NAME:-gamelibrary}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gameapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: gamelibrary-web
    environment:
      DATABASE_URL: postgresql://${DB_USER:-gameapp}:${DB_PASSWORD:-gameapp}@db:5432/${DB_NAME:-gamelibrary}
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    ports:
      - "${WEB_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "flask db upgrade && gunicorn --bind 0.0.0.0:5000 wsgi:app"
    volumes:
      - .:/app

volumes:
  pgdata:
